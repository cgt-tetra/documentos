<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Imagen a HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Convertir imagen a HTML</h1>

    <input type="file" id="imageInput" accept="image/*">
    <button id="convertBtn">Convertir</button>

    <h2>Resultado:</h2>
    <div id="output"></div>

    <h2>Código HTML generado:</h2>
    <textarea id="htmlCode" rows="10"></textarea>

    <script src="script.js"></script>
</body>
</html>
