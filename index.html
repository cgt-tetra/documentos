<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PDF/Imagen a HTML</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
</head>
<body>

<h2>Subir PDF o Imagen y convertir a HTML</h2>

<input type="file" id="fileInput" />
<br><br>

<label>Usuario GitHub:</label>
<input type="text" id="username" />
<br>

<label>Repositorio:</label>
<input type="text" id="repo" />
<br>

<label>Carpeta destino (ej: docs):</label>
<input type="text" id="folder" />
<br>

<label>Token GitHub:</label>
<input type="password" id="token" />
<br><br>

<button onclick="convertAndUpload()">Convertir y Subir</button>

<p id="result"></p>

<script>
async function convertAndUpload() {
  const file = document.getElementById('fileInput').files[0];
  const username = document.getElementById('username').value;
  const repo = document.getElementById('repo').value;
  const folder = document.getElementById('folder').value;
  const token = document.getElementById('token').value;

  if (!file) return alert("Selecciona un archivo");

  let htmlContent = "";

  if (file.type === "application/pdf") {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;

    htmlContent += "<html><body>";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const textContent = await page.getTextContent();
      textContent.items.forEach(item => {
        htmlContent += `<p>${item.str}</p>`;
      });
    }
    htmlContent += "</body></html>";

  } else if (file.type.startsWith("image/")) {
    const reader = new FileReader();
    reader.onload = async function(e) {
      htmlContent = `<html><body><img src="${e.target.result}" /></body></html>`;
      await uploadToGitHub(htmlContent, file.name, username, repo, folder, token);
    };
    reader.readAsDataURL(file);
    return;
  } else {
    alert("Formato no soportado");
    return;
  }

  await uploadToGitHub(htmlContent, file.name, username, repo, folder, token);
}

async function uploadToGitHub(content, originalName, username, repo, folder, token) {
  const fileName = originalName.split('.')[0] + ".html";
  const path = folder ? `${folder}/${fileName}` : fileName;

  const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${path}`, {
    method: "PUT",
    headers: {
      "Authorization": `token ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "Subiendo archivo convertido",
      content: btoa(unescape(encodeURIComponent(content)))
    })
  });

  if (response.ok) {
    const pageUrl = `https://${username}.github.io/${repo}/${path}`;
    document.getElementById("result").innerHTML =
      `Archivo subido correctamente.<br>
       <a href="${pageUrl}" target="_blank">Ver HTML</a><br>
       URL para compartir:<br>${pageUrl}`;
  } else {
    document.getElementById("result").innerText = "Error al subir.";
  }
}
</script>

</body>
</html>
